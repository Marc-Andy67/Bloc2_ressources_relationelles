name: 🛡️ Security — OWASP ZAP Scan

# Workflow déclenché manuellement sur un environnement de staging ou prod.
# NE PAS intégrer dans la CI — ZAP requiert une app HTTP réelle et accessible.
#
# Prérequis :
#   - L'environnement cible doit être déployé et accessible publiquement (ou via VPN)
#   - Configurer `.zap/rules.tsv` à la racine du projet pour ignorer les faux positifs
#
# Usage :
#   GitHub → Actions → "Security — OWASP ZAP Scan" → Run workflow
#   → saisir l'URL cible (ex: https://staging.your-app.com)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL de l'environnement à scanner"
        required: true
        default: "https://staging.your-app.com"
      scan_type:
        description: "Type de scan ZAP"
        required: true
        default: "full"
        type: choice
        options:
          - baseline   # Rapide (~2 min) — cherche les vulnérabilités passives
          - full        # Complet (~10 min) — inclut le spider + attaques actives

jobs:
  zap:
    name: 🛡️ OWASP ZAP — ${{ github.event.inputs.scan_type }} scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Scan Baseline (passif uniquement) ─────────────────────
      - name: ZAP Baseline Scan
        if: github.event.inputs.scan_type == 'baseline'
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ github.event.inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          issue_title: "ZAP Baseline — ${{ github.event.inputs.target_url }}"

      # ── Scan Full (spider + attaques actives) ─────────────────
      - name: ZAP Full Scan
        if: github.event.inputs.scan_type == 'full'
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ github.event.inputs.target_url }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          issue_title: "ZAP Full Scan — ${{ github.event.inputs.target_url }}"

      # ── Upload résultats → onglet Security GitHub ─────────────
      - name: Upload ZAP SARIF → Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: owasp-zap

      # ── Archive le rapport HTML ZAP (téléchargeable depuis l'UI Actions) ─
      - name: Upload rapport HTML ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.event.inputs.scan_type }}
          path: report_html.html
          retention-days: 30