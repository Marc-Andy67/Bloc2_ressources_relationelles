name: 🔒 CI — Security Scan (Trivy)

# Tourne après le build Docker sur main et les tags de release.
# Scan de l'image Docker publiée + scan filesystem des dépendances PHP/JS.
# Les résultats remontent dans l'onglet Security de GitHub (SARIF).

on:
  push:

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  trivy:
    name: 🔒 Trivy — Image + Filesystem
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # GHCR/OCI exige des noms d'image en minuscules
      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Scan de l'image Docker publiée ────────────────────────
      - name: Trivy — scan image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: 0     # Ne bloque pas le pipeline (les résultats remontent en Security tab)

      # ── Scan des dépendances PHP/JS (composer.lock, package-lock…) ─
      - name: Trivy — scan filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH

      # ── Upload vers l'onglet Security GitHub ──────────────────
      - name: Upload scan image → Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload scan filesystem → Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs